name: Build, Test and Deploy Full Stack

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    outputs:
      backend-artifact: backend
      frontend-artifact: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore CreateInvoiceSystem.sln

      - name: Build
        run: dotnet build CreateInvoiceSystem.sln --configuration Release --no-restore

      - name: Test
        env:
          ConnectionStrings__DefaultConnection: "Server=(localdb)\\mssqllocaldb;Database=TestDb;Trusted_Connection=True;"
        run: dotnet test test/CreateInvoiceSystem.BuildTests/CreateInvoiceSystem.BuildTests.csproj --configuration Release --no-build

      - name: Publish backend
        run: dotnet publish src/CreateInvoiceSystem.API/CreateInvoiceSystem.API.csproj -c Release -o ./publish-backend

      - name: Zip backend
        shell: pwsh
        run: |
          Remove-Item -Force -ErrorAction SilentlyContinue ./publish-backend.zip
          Compress-Archive -Path ./publish-backend/* -DestinationPath ./publish-backend.zip

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: publish-backend.zip

      - name: Publish frontend
        run: dotnet publish src/CreateInvoiceSystem.Frontend/CreateInvoiceSystem.Frontend.csproj -c Release -o ./publish-frontend

      - name: Zip frontend
        shell: pwsh
        run: |
          Remove-Item -Force -ErrorAction SilentlyContinue ./publish-frontend.zip
          Compress-Archive -Path ./publish-frontend/wwwroot/* -DestinationPath ./publish-frontend.zip

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: publish-frontend.zip

  deploy-backend:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: .

      - name: Deploy Backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'CreateInvoiceSystem-backend'
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: publish-backend.zip

  deploy-frontend:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: .

      - name: Deploy Frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'CreateInvoiceSystem-frontend'
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: publish-frontend.zip
